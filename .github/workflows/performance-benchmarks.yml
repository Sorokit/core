name: Performance Benchmarks

permissions:
  contents: read
  issues: write
  pull-requests: write

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run benchmark suite
        run: npm run test:bench

      - name: Publish benchmark report
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const reportPath = path.join(process.cwd(), 'src/tests/benchmarks/benchmark-report.json');
            if (!fs.existsSync(reportPath)) {
              core.info('No benchmark report was generated.');
              return;
            }
            const report = JSON.parse(fs.readFileSync(reportPath, 'utf8'));
            const lines = report.results.map((result) => `- ${result.name}: ${result.measuredMs.toFixed(3)} ms (baseline ${result.baselineMs.toFixed(3)} ms, regression ${result.regressionPct.toFixed(2)}%)`).join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## Performance benchmark report\n\n${lines}\n\nThreshold: 10% regression allowed.`
            });
